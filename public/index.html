
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gym Project</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #1a1a24;
            --accent-color: #ff3b30;
            --accent-green: #34c759;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            padding-bottom: 80px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .revision-badge {
            background-color: #2c2c3e;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 8px;
            font-weight: bold;
        }

        .revision-alert {
            background-color: var(--accent-color) !important;
            color: #fff !important;
            animation: pulse 2s infinite;
        }

        .progresso-treino-container {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2c2c3e;
        }

        .progresso-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .barra-progresso-total {
            width: 100%;
            height: 8px;
            background: #2c2c3e;
            border-radius: 4px;
            overflow: hidden;
        }

        #barra-progresso-preenchimento {
            width: 0%;
            height: 100%;
            background: var(--accent-green);
            transition: width 0.4s ease;
        }

        @keyframes pulse {
            0 { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .selector-treino {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .btn-dia {
            background: var(--card-bg);
            border: 1px solid #2c2c3e;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .btn-dia.ativo {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .card-exercicio, .card-medida {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-exercicio.concluido {
            border: 1px solid var(--accent-green);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .img-placeholder {
            width: 60px;
            height: 60px;
            background: #2c2c3e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-muted);
        }

        .ex-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .ex-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .inputs-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #2c2c3e;
            padding: 12px;
            border-radius: 10px;
        }

        .input-carga, .input-medida-val {
            width: 90px;
            background: var(--bg-color);
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        .series-counter-box {
            text-align: center;
        }
        
        .series-texto {
            font-size: 18px; 
            font-weight: bold;
            color: var(--accent-color);
        }
        
        .series-texto.tudo-feito {
            color: var(--accent-green);
        }

        .btn-done, .btn-salvar-medida {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-done:disabled {
            background: #444;
            color: #8e8e93;
        }

        .historico-medidas-box {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #3a3a4e;
            padding-top: 8px;
        }

        .nav-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: #16161f;
            border-top: 1px solid #2c2c3e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 900;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            flex: 1;
        }

        .nav-item.ativo {
            color: var(--accent-color);
        }

        .nav-icon {
            font-size: 20px;
        }

        .tela {
            display: none;
        }

        .tela.ativa {
            display: block;
        }

        #timer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 17, 0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        #timer-text {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: #2c2c3e;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        #progress-bar {
            width: 100%;
            height: 100%;
            background: var(--accent-color);
            transition: width 1s linear;
        }

        .btn-skip {
            background: #2c2c3e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gym Project ⚔️</h1>
        <div id="revision-tag" class="revision-badge">Calculando semanas...</div>
    </header>

    <div id="tela-treinos" class="tela ativa">
        <div class="progresso-treino-container">
            <div class="progresso-header">
                <span>COMPLETUDE DO TREINO</span>
                <span id="percentual-texto">0%</span>
            </div>
            <div class="barra-progresso-total">
                <div id="barra-progresso-preenchimento"></div>
            </div>
        </div>

        <div class="selector-treino" id="dia-seletor">
            <button class="btn-dia" onclick="carregarTreino('A')">SEG (A)</button>
            <button class="btn-dia" onclick="carregarTreino('D')">TER (D)</button>
            <button class="btn-dia" onclick="carregarTreino('B')">QUA (B)</button>
            <button class="btn-dia" onclick="carregarTreino('E')">QUI (E)</button>
            <button class="btn-dia" onclick="carregarTreino('C')">SEX (C)</button>
        </div>

        <div id="container-exercicios"></div>
    </div>

    <div id="tela-medidas" class="tela">
        <h2 style="margin-bottom: 15px; font-size: 20px; text-align: center; color: var(--accent-color);">AVALIAÇÃO DE EFICÁCIA 📐</h2>
        <p style="color: var(--text-muted); font-size: 13px; text-align: center; margin-bottom: 20px;">Atualize suas medidas semanalmente para validar o ganho de simetria.</p>
        <div id="container-medidas"></div>
    </div>

    <div id="timer-modal">
        <h2 style="margin-bottom: 10px; color: var(--text-muted);">DESCANSO</h2>
        <div id="timer-text">60s</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button class="btn-skip" onclick="pararCronometro()">Pular Descanso</button>
    </div>

    <nav class="nav-inferior">
        <button id="nav-treino" class="nav-item ativo" onclick="mudarTela('treinos')">
            <span class="nav-icon">🏋️‍♂️</span>
            <span>Treino</span>
        </button>
        <button id="nav-medida" class="nav-item" onclick="mudarTela('medidas')">
            <span class="nav-icon">📐</span>
            <span>Medidas</span>
        </button>
    </nav>

    <script>
        const bancoTreinos = {
            'A': { nome: "Treino A - Academia", exercicios: [{ id: "a1", nome: "Supino Inclinado Máquina", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "💪" }, { id: "a2", nome: "Puxada Alta Aberta Pulley", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "🦅" }, { id: "a3", nome: "Elevação Lateral na Polia", seriesTotais: 4, meta: "4s x 12-15 rep", tipo: "📐" }, { id: "a4", nome: "Leg Press 45°", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "🦵" }, { id: "a5", nome: "Tríceps Corda Polia", seriesTotais: 3, meta: "3s x 12 rep", tipo: "💥" }] },
            'B': { nome: "Treino B - Academia", exercicios: [{ id: "b1", nome: "Fly / Pec Deck Máquina", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "💪" }, { id: "b2", nome: "Remada Baixa Supinada", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "🦅" }, { id: "b3", nome: "Elevação Lateral Halteres", seriesTotais: 4, meta: "4s x 12-15 rep", tipo: "📐" }, { id: "b4", nome: "Cadeira Extensora", seriesTotais: 4, meta: "4s x 12-15 rep", tipo: "🦵" }, { id: "b5", nome: "Rosca Bíceps Barra Polia", seriesTotais: 3, meta: "3s x 12 rep", tipo: "💥" }] },
            'C': { nome: "Treino C - Academia", exercicios: [{ id: "c1", nome: "Supino Reto Máquina", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "💪" }, { id: "c2", nome: "Puxada Pegada Triângulo", seriesTotais: 4, meta: "4s x 10-12 rep", tipo: "🦅" }, { id: "c3", nome: "Crucifixo Invertido Máquina", seriesTotais: 4, meta: "4s x 12-15 rep", tipo: "📐" }, { id: "c4", nome: "Cadeira/Mesa Flexora", seriesTotais: 4, meta: "4s x 12-15 rep", tipo: "🦵" }, { id: "c5", nome: "Tríceps Testa + Rosca Martelo", seriesTotais: 3, meta: "3s x 12 rep", tipo: "💥" }] },
            'D': { nome: "Treino D - Em Casa", exercicios: [{ id: "d1", nome: "Flexão de Braço no Chão", seriesTotais: 4, meta: "4s x Máximo", tipo: "🏡" }, { id: "d2", nome: "Elevação Pélvica Unilateral", seriesTotais: 4, meta: "4s x 15 rep", tipo: "🍑" }, { id: "d3", nome: "Extensão Lombar Superman", seriesTotais: 4, meta: "4s x 15 rep", tipo: "🦅" }, { id: "d4", nome: "Agachamento Livre (Lento)", seriesTotais: 4, meta: "4s x 20 rep", tipo: "🦵" }, { id: "d5", nome: "Prancha Abdominal", seriesTotais: 3, meta: "3s x 45 seg", tipo: "🛡️" }] },
            'E': { nome: "Treino E - Em Casa", exercicios: [{ id: "e1", nome: "Flexão Pegada Aberta", seriesTotais: 4, meta: "4s x Máximo", tipo: "🏡" }, { id: "e2", nome: "Agachamento Búlgaro", seriesTotais: 4, meta: "4s x 12 rep", tipo: "🍑" }, { id: "e3", nome: "Remada Isometria (5s)", seriesTotais: 4, meta: "4s x 12 rep", tipo: "🦅" }, { id: "e4", nome: "Coice Glúteo 4 Apoios", seriesTotais: 4, meta: "4s x 15 rep", tipo: "🍑" }, { id: "e5", nome: "Abdominal Infra", seriesTotais: 3, meta: "3s x 15-20 rep", tipo: "🛡️" }] }
        };

        const listaMedidasBase = [
            { id: "ombros", nome: "Ombros (Largura V)", icone: "📐" },
            { id: "torax", nome: "Tórax / Peito", icone: "🛡️" },
            { id: "cintura", nome: "Cintura (Abdômen)", icone: "⏳" },
            { id: "gluteos", nome: "Glúteos", icone: "🍑" },
            { id: "braço_dir", nome: "Braço Direito", icone: "💪" },
            { id: "braço_esq", nome: "Braço Esquerdo", icone: "💪" }
        ];

        let tempoRestante;
        let intervaloCronometro;
        const TEMPO_DESCANSO = 60;
        let treinoAtualAtivo = '';
        let progressoSeries = {};

        window.onload = function() {
            limparMemoriaSeNovoDia();
            gerenciarDatas();
            abrirDiaAtual();
            renderizarPainelMedidas();
        };

        // VALIDAÇÃO DE DATA: Zera as séries se mudou o dia do calendário
        function limparMemoriaSeNovoDia() {
            const hojeKey = new Date().toDateString(); // Retorna ex: "Wed Jun 17 2026"
            const ultimaDataTreino = localStorage.getItem('conan_ultima_data_treino');

            if (ultimaDataTreino !== hojeKey) {
                // É um novo dia de treino, limpa apenas os contadores de séries antigas
                for (let key in localStorage) {
                    if (key.startsWith('conan_series_feitas_')) {
                        localStorage.removeItem(key);
                    }
                }
                localStorage.setItem('conan_ultima_data_treino', hojeKey);
            }
        }

        function mudarTela(telaAlvo) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'));

            if (telaAlvo === 'treinos') {
                document.getElementById('tela-treinos').classList.add('ativa');
                document.getElementById('nav-treino').classList.add('ativo');
            } else {
                document.getElementById('tela-medidas').classList.add('ativa');
                document.getElementById('nav-medida').classList.add('ativo');
                renderizarPainelMedidas();
            }
        }

        function gerenciarDatas() {
            let dataInicioStr = localStorage.getItem('conan_data_inicio');
            if (!dataInicioStr) {
                const hoje = new Date();
                localStorage.setItem('conan_data_inicio', hoje.toISOString());
                dataInicioStr = hoje.toISOString();
            }
            const semanas = Math.floor(Math.ceil(Math.abs(new Date() - new Date(dataInicioStr)) / (1000 * 60 * 60 * 24)) / 7) + 1;
            const tagRevisao = document.getElementById('revision-tag');
            if (semanas >= 6) {
                tagRevisao.innerText = `⚠️ REVISÃO MANDATÓRIA (Semana ${semanas})`;
                tagRevisao.classList.add('revision-alert');
            } else {
                tagRevisao.innerText = `Projeto Conan: Semana ${semanas} de 6`;
            }
        }

        function abrirDiaAtual() {
            const diaSemana = new Date().getDay();
            let treinoParaAbrir = 'A';
            if (diaSemana === 2) treinoParaAbrir = 'D';
            if (diaSemana === 3) treinoParaAbrir = 'B';
            if (diaSemana === 4) treinoParaAbrir = 'E';
            if (diaSemana === 5) treinoParaAbrir = 'C';
            carregarTreino(treinoParaAbrir);
        }

        function carregarTreino(letraTreino) {
            treinoAtualAtivo = letraTreino;
            progressoSeries = {};
            const botoes = document.querySelectorAll('.btn-dia');
            botoes.forEach(b => b.classList.remove('ativo'));
            const indexMapeamento = { 'A':0, 'D':1, 'B':2, 'E':3, 'C':4 };
            if(botoes[indexMapeamento[letraTreino]]) botoes[indexMapeamento[letraTreino]].classList.add('ativo');

            const container = document.getElementById('container-exercicios');
            container.innerHTML = "";

            bancoTreinos[letraTreino].exercicios.forEach(ex => {
                // Puxa as séries persistidas do banco para evitar o reset por bloqueio de tela
                const seriesSalvas = parseInt(localStorage.getItem(`conan_series_feitas_${ex.id}`)) || 0;
                progressoSeries[ex.id] = seriesSalvas;

                const cargaSalva = localStorage.getItem(`conan_carga_${ex.id}`) || "";
                const card = document.createElement('div');
                card.className = 'card-exercicio';
                card.id = `card-${ex.id}`;
                
                const estaConcluido = seriesSalvas === ex.seriesTotais;
                if (estaConcluido) card.classList.add('concluido');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="img-placeholder">${ex.tipo}</div>
                        <div class="ex-info"><h3>${ex.nome}</h3><p>${ex.meta}</p></div>
                    </div>
                    <div class="inputs-container">
                        <div>
                            <span style="font-size: 11px; color: var(--text-muted); display:block; margin-bottom:4px;">CARGA (KG):</span>
                            <input type="text" inputmode="decimal" id="input-${ex.id}" class="input-carga" placeholder="--" value="${cargaSalva}" onchange="localStorage.setItem('conan_carga_${ex.id}', this.value)">
                        </div>
                        <div class="series-counter-box">
                            <span style="font-size: 11px; color: var(--text-muted); display:block; margin-bottom:2px;">SÉRIES:</span>
                            <span id="cont-text-${ex.id}" class="series-texto ${estaConcluido ? 'tudo-feito' : ''}">${seriesSalvas} / ${ex.seriesTotais}</span>
                        </div>
                        <button id="btn-done-${ex.id}" class="btn-done" ${estaConcluido ? 'disabled' : ''} onclick="executarSerie('${ex.id}', ${ex.seriesTotais})">${estaConcluido ? 'OK' : 'Série Feita'}</button>
                    </div>`;
                container.appendChild(card);
            });
            atualizarBarraGeral();
        }

        function executarSerie(exId, maxSeries) {
            if (progressoSeries[exId] < maxSeries) {
                progressoSeries[exId]++;
                
                // Persiste imediatamente a série executada no LocalStorage do iOS
                localStorage.setItem(`conan_series_feitas_${exId}`, progressoSeries[exId]);

                const textoContador = document.getElementById(`cont-text-${exId}`);
                textoContador.innerText = `${progressoSeries[exId]} / ${maxSeries}`;
                
                if (progressoSeries[exId] === maxSeries) {
                    textoContador.classList.add('tudo-feito');
                    document.getElementById(`card-${exId}`).classList.add('concluido');
                    document.getElementById(`btn-done-${exId}`).disabled = true;
                    document.getElementById(`btn-done-${exId}`).innerText = "OK";
                }
                atualizarBarraGeral();
                iniciarCronometro();
            }
        }

        function atualizarBarraGeral() {
            let total = 0, feitos = 0;
            bancoTreinos[treinoAtualAtivo].exercicios.forEach(ex => {
                total += ex.seriesTotais;
                feitos += (progressoSeries[ex.id] || 0);
            });
            const pct = Math.round((feitos / total) * 100) || 0;
            document.getElementById('percentual-texto').innerText = `${pct}%`;
            document.getElementById('barra-progresso-preenchimento').style.width = `${pct}%`;
        }

        function renderizarPainelMedidas() {
            const container = document.getElementById('container-medidas');
            container.innerHTML = "";

            listaMedidasBase.forEach(med => {
                const atualSalva = localStorage.getItem(`conan_medida_atual_${med.id}`) || "";
                const anteriorSalva = localStorage.getItem(`conan_medida_ant_${med.id}`) || "--";

                let feedbackEficacia = "";
                if (atualSalva && anteriorSalva !== "--") {
                    const diff = (parseFloat(atualSalva) - parseFloat(anteriorSalva)).toFixed(1);
                    if (diff > 0) {
                        feedbackEficacia = `<span style="color:var(--accent-green)">📈 +${diff} cm</span>`;
                    } else if (diff < 0) {
                        const cor = (med.id === "cintura") ? "var(--accent-green)" : "var(--accent-color)";
                        feedbackEficacia = `<span style="color:${cor}">📉 ${diff} cm</span>`;
                    } else {
                        feedbackEficacia = `<span style="color:var(--text-muted)">= Estável</span>`;
                    }
                }

                const card = document.createElement('div');
                card.className = 'card-medida';
                card.innerHTML = `
                    <div class="card-header" style="margin-bottom: 10px;">
                        <div class="img-placeholder" style="width:45px; height:45px; font-size:18px;">${med.icone}</div>
                        <div class="ex-info"><h3>${med.nome}</h3></div>
                    </div>
                    <div class="inputs-container">
                        <div>
                            <span style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:4px;">ATUAL (CM):</span>
                            <input type="text" inputmode="decimal" id="med-${med.id}" class="input-medida-val" placeholder="00.0" value="${atualSalva}">
                        </div>
                        <button class="btn-salvar-medida" onclick="salvarMedida('${med.id}')">Salvar</button>
                    </div>
                    <div class="historico-medidas-box">
                        <span>Anterior: <b>${anteriorSalva} cm</b></span>
                        <span>Eficácia: ${feedbackEficacia || "Sem histórico"}</span>
                    </div>`;
                container.appendChild(card);
            });
        }

        function salvarMedida(idMedida) {
            const inputVal = document.getElementById(`med-${idMedida}`).value;
            if (inputVal) {
                const valorAtualAntigo = localStorage.getItem(`conan_medida_atual_${idMedida}`);
                if (valorAtualAntigo && valorAtualAntigo !== inputVal) {
                    localStorage.setItem(`conan_medida_ant_${idMedida}`, valorAtualAntigo);
                }
                localStorage.setItem(`conan_medida_atual_${idMedida}`, inputVal);
                alert("Medida atualizada!");
                renderizarPainelMedidas();
            }
        }

        function iniciarCronometro() {
            tempoRestante = TEMPO_DESCANSO;
            document.getElementById('timer-modal').style.display = 'flex';
            atualizarTelaCronometro();
            intervaloCronometro = setInterval(() => {
                tempoRestante--;
                atualizarTelaCronometro();
                if (tempoRestante <= 0) {
                    pararCronometro();
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            }, 1000);
        }
        function atualizarTelaCronometro() {
            document.getElementById('timer-text').innerText = `${tempoRestante}s`;
            document.getElementById('progress-bar').style.width = `${(tempoRestante / TEMPO_DESCANSO) * 100}%`;
        }
        function pararCronometro() {
            clearInterval(intervaloCronometro);
            document.getElementById('timer-modal').style.display = 'none';
        }
    </script>
</body>
</html>
