<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Nutricional - Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #30d158; text-align: center; }
        
        select, input, textarea { background-color: #1c1c1e; border: 1px solid #2c2c2e; color: #fff; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; margin-bottom: 12px; }
        label { font-size: 0.85rem; color: #aeaeb2; display: block; margin-bottom: 4px; font-weight: 600; }
        
        button { background-color: #0a84ff; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        button.btn-sucesso { background-color: #30d158; color: #000; }
        button.btn-secundario { background-color: #2c2c2e; color: #fff; }
        
        .box { background-color: #1c1c1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #2c2c2e; }
        .row { display: flex; gap: 10px; }
        .item-lista-ref { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2c2c2e; border-radius: 6px; margin-bottom: 6px; font-size: 0.9rem; }
        
        .checkbox-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .check-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .check-item input { width: auto; margin-bottom: 0; }
    </style>
</head>
<body>

    <h1>Gerenciador de Dietas</h1>

    <label>1. Selecione o Dia para Trabalhar</label>
    <select id="select-dia" onchange="carregarRefeicoesDoDiaSelecionado()">
        <option value="segunda">Segunda-feira</option>
        <option value="terca">Terça-feira</option>
        <option value="quarta">Quarta-feira</option>
        <option value="quinta">Quinta-feira</option>
        <option value="sexta">Sexta-feira</option>
        <option value="sabado">Sábado</option>
        <option value="domingo">Domingo</option>
    </select>

    <!-- Form de Nova Refeição -->
    <div class="box">
        <h3 style="margin-bottom:10px; font-size:1rem;">+ Adicionar/Editar Refeição</h3>
        <div class="row">
            <div>
                <label>Horário</label>
                <input type="time" id="ref-hora" value="08:00">
            </div>
            <div style="flex:1;">
                <label>Nome da Refeição</label>
                <input type="text" id="ref-nome" placeholder="Ex: Café da Manhã, Ceia">
            </div>
        </div>
        <label>Alimentos (Um por linha)</label>
        <textarea id="ref-alimentos" rows="4" placeholder="Ex: 3 Ovos mexidos&#10;1 Banana"></textarea>
        <button onclick="adicionarRefeicao()">Inserir no Dia</button>
    </div>

    <!-- Lista do Dia Atual -->
    <div class="box">
        <h3 style="margin-bottom:10px; font-size:1rem;">Refeições de Hoje na Tela</h3>
        <div id="lista-refeicoes-dia"></div>
    </div>

    <!-- Replicação em Lote -->
    <div class="box">
        <h3 style="margin-bottom:4px; font-size:1rem;">👯 Replicar Estrutura Deste Dia</h3>
        <p style="font-size:0.75rem; color:#8e8e93; margin-bottom:10px;">Copiar todas as refeições da tela para os dias marcados:</p>
        <div class="checkbox-group">
            <div class="check-item"><input type="checkbox" value="segunda" class="chk-dia"> Seg</div>
            <div class="check-item"><input type="checkbox" value="terca" class="chk-dia"> Ter</div>
            <div class="check-item"><input type="checkbox" value="quarta" class="chk-dia"> Qua</div>
            <div class="check-item"><input type="checkbox" value="quinta" class="chk-dia"> Qui</div>
            <div class="check-item"><input type="checkbox" value="sexta" class="chk-dia"> Sex</div>
            <div class="check-item"><input type="checkbox" value="sabado" class="chk-dia"> Sáb</div>
            <div class="check-item"><input type="checkbox" value="domingo" class="chk-dia"> Dom</div>
        </div>
        <button class="btn-secundario" onclick="replicarEntreDias()">Replicar em Lote</button>
    </div>

    <button class="btn-sucesso" style="font-size:1.1rem; padding:16px;" onclick="salvarNaNuvem()">☁️ SALVAR DIETA ONLINE</button>

    <script>
        const API_URL = '/api/nutriapp';
        let databaseCompleta = { segunda:[], terca:[], quarta:[], quinta:[], sexta:[], sabado:[], domingo:[] };

        async function puxarDadosIniciais() {
            try {
                const res = await fetch(API_URL);
                databaseCompleta = await res.json();
                carregarRefeicoesDoDiaSelecionado();
            } catch (e) {
                alert("Erro ao conectar com a API da Vercel.");
            }
        }

        function carregarRefeicoesDoDiaSelecionado() {
            const dia = document.getElementById('select-dia').value;
            const container = document.getElementById('lista-refeicoes-dia');
            container.innerHTML = "";

            const lista = databaseCompleta[dia] || [];
            lista.sort((a,b) => a.hora.localeCompare(b.hora));

            if(lista.length === 0) {
                container.innerHTML = `<p style="color:#8e8e93; font-size:0.85rem;">Nenhuma refeição neste dia.</p>`;
                return;
            }

            lista.forEach((ref, index) => {
                container.innerHTML += `
                    <div class="item-lista-ref">
                        <div><b>${ref.hora}</b> - ${ref.nome}</div>
                        <button class="btn-danger-xs" style="width:auto; padding:4px 8px; margin-bottom:0;" onclick="removerRefeicao(${index})">✕</button>
                    </div>`;
            });
        }

        function adicionarRefeicao() {
            const dia = document.getElementById('select-dia').value;
            const hora = document.getElementById('ref-hora').value;
            const nome = document.getElementById('ref-nome').value.trim();
            const alimentos = document.getElementById('ref-alimentos').value.trim();

            if(!nome || !alimentos) { alert("Preencha o nome e os alimentos!"); return; }

            databaseCompleta[dia].push({ hora, nome, alimentos });
            
            // Limpa campos
            document.getElementById('ref-nome').value = "";
            document.getElementById('ref-alimentos').value = "";
            
            carregarRefeicoesDoDiaSelecionado();
        }

        function removerRefeicao(index) {
            const dia = document.getElementById('select-dia').value;
            databaseCompleta[dia].splice(index, 1);
            carregarRefeicoesDoDiaSelecionado();
        }

        function replicarEntreDias() {
            const diaOrigem = document.getElementById('select-dia').value;
            const checkboxes = document.querySelectorAll('.chk-dia:checked');
            
            if(checkboxes.length === 0) { alert("Marque pelo menos um dia para receber a cópia."); return; }

            checkboxes.forEach(cb => {
                const diaDestino = cb.value;
                // Deep clone da estrutura de refeições para evitar referências cruzadas
                databaseCompleta[diaDestino] = JSON.parse(JSON.stringify(databaseCompleta[diaOrigem]));
            });

            alert(`Estrutura de ${diaOrigem} copiada com sucesso para os dias selecionados!`);
            // Desmarca todos
            checkboxes.forEach(cb => cb.checked = false);
        }

        async function salvarNaNuvem() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(databaseCompleta)
                });
                if(res.ok) alert("🎉 Dieta atualizada e publicada na Nuvem com sucesso!");
            } catch (e) {
                alert("Erro ao salvar dados.");
            }
        }

        // Inicializa
        puxarDadosIniciais();
    </script>
</body>
</html>
