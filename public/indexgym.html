        // INFRAESTRUTURA INDEXEDDB PARA ARMAZENAMENTO COMPACTO DE FOTOS
        function inicializarBancoFotos() {
            const request = indexedDB.open("ConanAppDB", 1);
            request.onupgradeneeded = function(e) {
                let db = e.target.result;
                if (!db.objectStoreNames.contains("galeria_evolucao")) {
                    db.createObjectStore("galeria_evolucao", { keyPath: "id", autoIncrement: true });
                }
            };
            request.onsuccess = function(e) {
                dbConan = e.target.result;
                carregarGaleriaFotos();
            };
        }

        function processarFotoEvolucao(input) {
            if (input.files && input.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const base64Img = e.target.result;
                    const dataAtual = new Date();
                    const dataFormatada = dataAtual.toLocaleDateString('pt-BR') + ' ' + dataAtual.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    const transacao = dbConan.transaction(["galeria_evolucao"], "readwrite");
                    const store = transacao.objectStore("galeria_evolucao");
                    
                    store.add({ img: base64Img, data: dataFormatada, timestamp: dataAtual.getTime() });
                    
                    transacao.oncomplete = function() {
                        carregarGaleriaFotos();
                        input.value = "";
                    };
                };
                leitor.readAsDataURL(input.files[0]);
            }
        }

        function carregarGaleriaFotos() {
            if (!dbConan) return;
            const container = document.getElementById("container-galeria-fotos");
            container.innerHTML = "";

            const store = dbConan.transaction(["galeria_evolucao"], "readonly").objectStore("galeria_evolucao");
            const fotos = [];

            store.openCursor().onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    fotos.push(cursor.value);
                    cursor.continue();
                } else {
                    // Ordena decrescente (mais recente primeiro)
                    fotos.sort((a, b) => b.timestamp - a.timestamp);
                    
                    if (fotos.length === 0) {
                        container.innerHTML = `<span style="color: var(--text-muted); font-size: 13px; grid-column: span 3; text-align: center; padding: 20px 0;">Nenhuma foto salva no histórico</span>`;
                        return;
                    }

                    fotos.forEach(foto => {
                        const div = document.createElement("div");
                        div.className = "item-foto";
                        div.onclick = () => abrirVisualizador(foto);
                        div.innerHTML = `
                            <img src="${foto.img}">
                            <div class="data-foto">${foto.data.split(' ')[0]}</div>
                        `;
                        container.appendChild(div);
                    });
                }
            };
        }

        function abrirVisualizador(fotoObj) {
            document.getElementById("img-modal-zoom").src = fotoObj.img;
            document.getElementById("data-modal-zoom").innerText = `Registrado em: ${fotoObj.data}`;
            
            const btnDeletar = document.getElementById("btn-deletar-foto");
            btnDeletar.onclick = function() {
                if(confirm("Deseja realmente apagar esta foto do seu histórico visual?")) {
                    const transacao = dbConan.transaction(["galeria_evolucao"], "readwrite");
                    transacao.objectStore("galeria_evolucao").delete(fotoObj.id);
                    transacao.oncomplete = function() {
                        fecharVisualizador();
                        carregarGaleriaFotos();
                    };
                }
            };
            document.getElementById("visualizador-modal").style.display = "flex";
        }

        function fecharVisualizador() {
            document.getElementById("visualizador-modal").style.display = "none";
        }

        function mudarTela(telaAlvo) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'));

            if (telaAlvo === 'treinos') {
                document.getElementById('tela-treinos').classList.add('ativa');
                document.getElementById('nav-treino').classList.add('ativo');
            } else if (telaAlvo === 'dieta') {
                document.getElementById('tela-dieta').classList.add('ativa');
                document.getElementById('nav-dieta').classList.add('ativo');
                const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
                const hojeNome = dias[new Date().getDay()];
                carregarDieta(hojeNome);
            } else {
                document.getElementById('tela-medidas').classList.add('ativa');
                document.getElementById('nav-medida').classList.add('ativo');
                carregarGaleriaFotos();
            }
        }

        function gerenciarDatas() {
            let dataInicioStr = localStorage.getItem('conan_data_inicio');
            if (!dataInicioStr) {
                const hoje = new Date();
                localStorage.setItem('conan_data_inicio', hoje.toISOString());
                dataInicioStr = hoje.toISOString();
            }
            const semanas = Math.floor(Math.ceil(Math.abs(new Date() - new Date(dataInicioStr)) / (1000 * 60 * 60 * 24)) / 7) + 1;
            const tagRevisao = document.getElementById('revision-tag');
            if (semanas >= 6) {
                tagRevisao.innerText = `⚠️ REVISÃO MANDATÓRIA (Semana ${semanas})`;
                tagRevisao.classList.add('revision-alert');
            } else {
                tagRevisao.innerText = `Projeto Conan: Semana ${semanas} de 6`;
            }
        }

        function abrirDiaAtual() {
            const diaSemana = new Date().getDay();
            let t = 'A';
            if (diaSemana === 2) t = 'D';
            if (diaSemana === 3) t = 'B';
            if (diaSemana === 4) t = 'E';
            if (diaSemana === 5) t = 'C';
            carregarTreino(t);
        }

        function carregarTreino(letraTreino) {

            const botoes = document.getElementById('dia-seletor').querySelectorAll('.btn-seletor');
            botoes.forEach(b => b.classList.remove('ativo'));
            const mapeamento = { 'A':0, 'D':1, 'B':2, 'E':3, 'C':4 };
            botoes[mapeamento[letraTreino]].classList.add('ativo');

            const container = document.getElementById('container-exercicios');
            container.innerHTML = "";

            bancoTreinos[letraTreino].exercicios.forEach(ex => {
                const seriesSalvas = parseInt(localStorage.getItem(`conan_series_feitas_${ex.id}`)) || 0;
                progressoSeries[ex.id] = seriesSalvas;
                const cargaSalva = localStorage.getItem(`conan_carga_${ex.id}`) || "";
                
                const card = document.createElement('div');
                card.className = 'card-layout card-exercicio';
                card.id = `card-${ex.id}`;
                if (seriesSalvas === ex.seriesTotais) card.classList.add('concluido');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="img-container-app" onclick="mostrarDicas('${ex.nome}', '${ex.dica}')">
                            <img src="${ex.img}" onerror="this.src=''; this.parentElement.innerText='${ex.tipo}'">
                        </div>
                        <div class="ex-info"><h3>${ex.nome}</h3><p>${ex.meta}</p></div>
                    </div>
                    <div class="inputs-container">
                        <div>
                            <span style="font-size: 11px; color: var(--text-muted); display:block; margin-bottom:4px;">CARGA (KG):</span>
                            <input type="text" inputmode="decimal" class="input-estilo" placeholder="--" value="${cargaSalva}" onchange="localStorage.setItem('conan_carga_${ex.id}', this.value)">
                        </div>
                        <div style="text-align:center;">
                            <span style="font-size: 11px; color: var(--text-muted); display:block; margin-bottom:2px;">SÉRIES:</span>
                            <span id="cont-text-${ex.id}" class="series-texto ${seriesSalvas === ex.seriesTotais ? 'tudo-feito' : ''}">${seriesSalvas} / ${ex.seriesTotais}</span>
                        </div>
                        <button id="btn-done-${ex.id}" class="btn-done" ${seriesSalvas === ex.seriesTotais ? 'disabled' : ''} onclick="executarSerie('${ex.id}', ${ex.seriesTotais})">${seriesSalvas === ex.seriesTotais ? 'OK' : 'Série'}</button>
                    </div>`;
                container.appendChild(card);
            });
            atualizarBarraGeral();
        }

        function executarSerie(exId, maxSeries) {
            if (progressoSeries[exId] < maxSeries) {
                progressoSeries[exId]++;
                localStorage.setItem(`conan_series_feitas_${exId}`, progressoSeries[exId]);
                const txt = document.getElementById(`cont-text-${exId}`);
                txt.innerText = `${progressoSeries[exId]} / ${maxSeries}`;
                
                if (progressoSeries[exId] === maxSeries) {
                    txt.classList.add('tudo-feito');
                    document.getElementById(`card-${exId}`).classList.add('concluido');
                    document.getElementById(`btn-done-${exId}`).disabled = true;
                    document.getElementById(`btn-done-${exId}`).innerText = "OK";
                }
                atualizarBarraGeral();
                iniciarCronometro();
            }
        }

        function atualizarBarraGeral() {
            let total = 0, feitos = 0;
            bancoTreinos[treinoAtualAtivo].exercicios.forEach(ex => {
                total += ex.seriesTotais;
                feitos += (progressoSeries[ex.id] || 0);
            });
            const pct = Math.round((feitos / total) * 100) || 0;
            document.getElementById('percentual-texto').innerText = `${pct}%`;
            document.getElementById('barra-progresso-preenchimento').style.width = `${pct}%`;
        }

        function mostrarDicas(nome, dica) {
            document.getElementById('layer-titulo-ex').innerText = nome;

        }

        function fecharDicas() {

        }

        function iniciarCronometro() {
            tempoRestante = 60;
            document.getElementById('timer-modal').style.display = 'flex';
            document.getElementById('timer-text').innerText = `60s`;
            document.getElementById('progress-bar').style.width = '100%';
            
            clearInterval(intervaloCronometro);
            intervaloCronometro = setInterval(() => {
                tempoRestante--;
                document.getElementById('timer-text').innerText = `${tempoRestante}s`;
                document.getElementById('progress-bar').style.width = `${(tempoRestante / 60) * 100}%`;
                if (tempoRestante <= 0) pararCronometro();
            }, 1000);
        }

        function pararCronometro() {
            clearInterval(intervaloCronometro);
            document.getElementById('timer-modal').style.display = 'none';
        }

// SUBSTITUA A FUNÇÃO JavaScript ANTERIOR POR ESTA AQUI:
document.getElementById('btnAnimarEvolucao').addEventListener('click', iniciarAnimacaoEvolutiva);

function iniciarAnimacaoEvolutiva() {
    if (!dbConan) {
        alert("O banco de dados de fotos ainda não está pronto.");
        return;
    }

    const stage = document.getElementById('evolutionStage');
    stage.innerHTML = ""; // Limpa a animação anterior

    // 1. Abrimos uma requisição de leitura no seu IndexedDB real
    const store = dbConan.transaction(["galeria_evolucao"], "readonly").objectStore("galeria_evolucao");
    const fotos = [];

    store.openCursor().onsuccess = function(e) {
        const cursor = e.target.result;
        if (cursor) {
            fotos.push(cursor.value);
            cursor.continue();
        } else {
            // Quando terminar de ler todas as fotos do banco...
            
            if (fotos.length < 2) {
                stage.innerHTML = `<div style="color: #fff; text-align: center; padding: 40px 10px; font-size: 14px;">Você precisa de pelo menos 2 fotos salvas na galeria para ver a evolução.</div>`;
                return;
            }

            // 2. Ordena da mais ANTIGA para a mais RECENTE (cronológica para a animação)
            fotos.sort((a, b) => a.timestamp - b.timestamp);
            
            const totalFotos = fotos.length;

            // 3. Renderiza as fotos no palco com o empilhamento correto (z-index)
            fotos.forEach((fotoObj, index) => {
                const img = document.createElement('img');
                img.src = fotoObj.img; // Aqui ele puxa o código Base64 real da imagem
                img.classList.add('evolution-photo');
                
                // A foto mais antiga fica por cima de todas (maior z-index)
                img.style.zIndex = totalFotos - index; 
                
                stage.appendChild(img);
            });

            // 4. Executa o efeito de Morphing/Transparência cumulativa
            setTimeout(() => {
                const imagensRenderizadas = stage.querySelectorAll('.evolution-photo');
                
                function rodarPasso(index) {
                    // A última foto (mais recente) permanece visível
                    if (index === totalFotos - 1) return; 
                    
                    // Altera a opacidade para 95% transparente (sobrando 5% de 'fantasma')
                    imagensRenderizadas[index].style.opacity = "0.05";
                    
                    // Espera os 3 segundos da transição CSS acabar para rodar a próxima foto
                    setTimeout(() => {
                        rodarPasso(index + 1);
                    }, 3000);
                }
                
                // Dispara o ciclo a partir da primeira foto (a mais antiga)
                rodarPasso(0);
            }, 100);
        }
    };
}
